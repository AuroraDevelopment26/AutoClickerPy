<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoClicker – Aurora Development</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #cdd6f4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(137,180,250,.12) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(166,227,161,.08) 0%, transparent 70%);
    bottom: -150px;
    left: -150px;
    pointer-events: none;
  }

  .card {
    background: rgba(49, 50, 68, .6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 24px;
    padding: 3.5rem 3rem;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
    position: relative;
    animation: fadeIn .6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #89b4fa, #b4befe);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 1.25rem;
    box-shadow: 0 8px 24px rgba(137,180,250,.3);
  }

  h1 {
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -.02em;
    background: linear-gradient(135deg, #89b4fa, #b4befe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: .25rem;
  }

  .sub {
    color: #585b70;
    font-size: .85rem;
    font-weight: 500;
    letter-spacing: .03em;
    margin-bottom: 1.75rem;
  }

  .version-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .75rem;
    margin-bottom: 2rem;
  }

  .version-badge {
    background: rgba(166,227,161,.12);
    color: #a6e3a1;
    padding: .35rem 1rem;
    border-radius: 100px;
    font-size: .8rem;
    font-weight: 700;
    border: 1px solid rgba(166,227,161,.15);
  }

  .dot {
    width: 6px;
    height: 6px;
    background: #585b70;
    border-radius: 50%;
  }

  .update-status {
    font-size: .75rem;
    color: #585b70;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    background: linear-gradient(135deg, #89b4fa, #b4befe);
    color: #0f0f1a;
    text-decoration: none;
    padding: .9rem 2.25rem;
    border-radius: 12px;
    font-weight: 700;
    font-size: .95rem;
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(137,180,250,.25);
    margin-bottom: 2rem;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(137,180,250,.35);
  }

  .btn:active { transform: translateY(0); }

  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .5rem;
    text-align: left;
    margin: 0 0 2rem;
  }

  .features span {
    background: rgba(69, 71, 90, .4);
    padding: .5rem .85rem;
    border-radius: 10px;
    font-size: .82rem;
    color: #bac2de;
    font-weight: 500;
    transition: background .15s;
  }

  .features span:hover { background: rgba(69, 71, 90, .7); }

  .features span::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #89b4fa;
    border-radius: 2px;
    margin-right: .5rem;
    vertical-align: middle;
  }

  .links {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
  }

  .links a {
    color: #585b70;
    text-decoration: none;
    font-size: .82rem;
    font-weight: 500;
    transition: color .15s;
  }

  .links a:hover { color: #89b4fa; }

  .footer {
    margin-top: 2.5rem;
    font-size: .75rem;
    color: #45475a;
  }

  .footer a { color: #45475a; text-decoration: none; }
  .footer a:hover { color: #585b70; }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.5rem; }
    .features { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">◆</div>
  <h1>AutoClicker</h1>
  <p class="sub">AURORA DEVELOPMENT</p>

  <div class="version-row">
    <span class="version-badge" id="version">v1.2</span>
    <span class="dot"></span>
    <span class="update-status" id="updateStatus">Checke Update...</span>
  </div>

  <a class="btn" href="https://github.com/AnimaDev24/AutoClickerPy/releases/download/v1.2/AutoClicker_v1.2_Setup.exe" target="_blank">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download
  </a>

  <div class="features">
    <span>Frei einstellbares Intervall</span>
    <span>Links / Rechts / Mitte</span>
    <span>Single- & Doppelklick</span>
    <span>Frei wählbarer Shortcut</span>
    <span>Automatische Update-Prüfung</span>
    <span>Modernes Dark-Design</span>
  </div>

  <div class="links">
    <a href="https://github.com/AnimaDev24/AutoClickerPy" target="_blank">GitHub</a>
    <a href="https://github.com/AnimaDev24/AutoClickerPy/releases" target="_blank">Releases</a>
    <a href="https://github.com/AnimaDev24/AutoClickerPy/issues" target="_blank">Feedback</a>
    <a href="https://github.com/AnimaDev24/AutoClickerPy/releases" target="_blank">Alle Versionen</a>
  </div>
</div>

<div class="footer">
  &copy; Aurora Development &mdash; <a href="https://github.com/AnimaDev24/AutoClickerPy" target="_blank">Open Source</a>
</div>

<script>
  (function() {
    var vEl = document.getElementById('version');
    var sEl = document.getElementById('updateStatus');
    fetch('https://gist.githubusercontent.com/AnimaDev24/4aef74220ecad2f569e06b6027a2199e/raw/gistfile1.txt')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        vEl.textContent = 'v' + d.version;
        sEl.textContent = 'Aktuell';
        sEl.style.color = '#a6e3a1';
      })
      .catch(function() {
        sEl.textContent = 'Keine Verbindung';
      });
  })();
</script>
</body>
</html>
